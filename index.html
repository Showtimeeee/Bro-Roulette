<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bro Roulette</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app">
        <main class="wheel-area">
            <div class="result-banner" id="result-banner">
                <span id="result-text">Добавьте варианты и крутите!</span>
            </div>
            <div class="wheel-container">
                <div class="arrow" id="arrow">&#9660;</div>
                <canvas id="wheel" width="540" height="540"></canvas>
                <button class="spin-btn" id="spin-btn">КРУТИТЬ</button>
            </div>
        </main>

        <aside class="sidebar">
            <h2>Варианты</h2>
            <div id="options-list"></div>
            <div class="add-option">
                <input type="text" id="option-input" placeholder="Новый вариант..." maxlength="30">
                <button id="add-btn">+</button>
            </div>
            <div class="btn-row">
                <button id="clear-all-btn" class="secondary-btn danger-btn">Удалить все</button>
                <button id="reset-btn" class="secondary-btn">Сбросить</button>
            </div>
        </aside>

        <section class="history-section">
            <button class="history-toggle" id="history-toggle">
                <span>История</span>
                <span class="history-arrow" id="history-arrow">&#9660;</span>
            </button>
            <div class="history-body" id="history-body">
                <div id="history-list"></div>
                <button id="clear-history-btn" class="secondary-btn danger-btn">Очистить историю</button>
            </div>
        </section>
    </div>

    <footer class="footer">
        v1.2 &bull; 2026 &bull; &copy; Vadim &bull; <a href="mailto:seevaa57@gmail.com">seevaa57@gmail.com</a>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
